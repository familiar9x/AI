events {}

http {
  # Basic hardening
  server_tokens off;
  client_max_body_size 10m;

  # Rate limit zones (per IP)
  # Public chat: expensive => stricter
  limit_req_zone $binary_remote_addr zone=public_chat:10m rate=5r/s;
  # Public general API
  limit_req_zone $binary_remote_addr zone=public_api:10m rate=20r/s;
  # Internal higher
  limit_req_zone $binary_remote_addr zone=internal_api:10m rate=50r/s;

  upstream api_backend { server api:8000; }
  upstream dashboard_backend { server dashboard:8501; }

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  server {
    listen 80;
    server_name _;

    # Security headers (basic)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # Optional: hide swagger/redoc from public
    location ~* ^/api/(docs|redoc|openapi\.json) {
      return 404;
    }

    # Public API
    location ^~ /api/public/ {
      limit_req zone=public_api burst=40 nodelay;

      proxy_pass http://api_backend/public/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Stricter limit for chatbot endpoint specifically
    location = /api/public/chat/ask {
      limit_req zone=public_chat burst=10 nodelay;

      proxy_pass http://api_backend/public/chat/ask;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Internal API (restrict by IP range)
    location ^~ /api/internal/ {
      # TODO: sửa thành dải IP LAN/VPN của bạn
      allow 10.0.0.0/8;
      allow 192.168.0.0/16;
      allow 172.16.0.0/12;
      deny all;

      limit_req zone=internal_api burst=80 nodelay;

      proxy_pass http://api_backend/internal/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # UI
    location / {
      proxy_pass http://dashboard_backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      
      # WebSocket support for Streamlit
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 86400;
    }
  }
}
